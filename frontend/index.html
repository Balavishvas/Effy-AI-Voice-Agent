<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Effi AI Voice Assistant</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- LiveKit Client SDK -->
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Background decorative elements -->
        <div class="ambient-glow bg-glow-1"></div>
        <div class="ambient-glow bg-glow-2"></div>

        <header>
            <div class="logo">
                <span class="logo-dot"></span>
                <h1>Effi.ai</h1>
            </div>
            <div class="connection-badge" id="connection-status">
                <span class="status-indicator offline"></span>
                <span class="status-text">Disconnected</span>
            </div>
        </header>

        <main class="main-content">
            <!-- Visualizer Section -->
            <div class="visualizer-container">
                <div class="assistant-sphere-wrapper">
                    <div class="assistant-sphere" id="sphere">
                        <div class="inner-glow"></div>
                    </div>
                    <!-- Outer pulsating wave rings -->
                    <div class="wave-ring ring-1"></div>
                    <div class="wave-ring ring-2"></div>
                    <div class="wave-ring ring-3"></div>
                </div>

                <div class="status-overlay">
                    <h2 id="assistant-state">Ready to talk</h2>
                    <p id="sub-status">Click start to connect with Effi</p>
                </div>
            </div>

            <!-- Controls Section -->
            <div class="controls-panel">
                <button class="btn btn-primary" id="btn-connect">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12B12,13H11V16H13V18H11V20H13V22A8,8 0 0,1 4,12A8,8 0 0,1 12,4Z" />
                        <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
                    </svg>
                    <span>Start Session</span>
                </button>
                
                <button class="btn btn-secondary" id="btn-mute" disabled>
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
                    </svg>
                    <span>Mute Mic</span>
                </button>
            </div>
        </main>

        <footer>
            <p>Effi is a supportive, intelligent friend. Powered by Gemini Multimodal Live API.</p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
